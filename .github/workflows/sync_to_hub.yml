name: Sync to Hugging Face Hub
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true
      - name: Push to Hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          pip install huggingface_hub
          python - <<'EOF'
          import os
          from huggingface_hub import HfApi
          HfApi().upload_folder(
              folder_path=".",
              repo_id="Nicholas-Nevan-Kurniawan/Arxiv-rag",
              repo_type="space",
              token=os.environ["HF_TOKEN"],
              ignore_patterns=[".git", ".github", ".venv", "__pycache__", "*.pyc", ".env", "data/", "archive/", "scratch/"],
          )
          EOF